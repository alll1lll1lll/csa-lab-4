name: CI

on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ruff mypy pytest pytest-golden

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy --strict Isa/ Translator/ Machine/ tests/

      - name: Run golden tests
        run: pytest tests/ -v
